> Cub's:
name: Build VirtLab APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el código
        uses: actions/checkout@v4

      - name: Acomodar el proyecto en la raíz
        run: |
          if [ -f "virtlab_flutter.zip" ]; then
            unzip -o virtlab_flutter.zip -d _extracted
            cp -r _extracted/virtlab_flutter/. .
            rm -rf _extracted virtlab_flutter.zip
          elif [ -d "virtlab_flutter" ]; then
            cp -r virtlab_flutter/. .
            rm -rf virtlab_flutter
          fi

      - name: Instalar Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Generar carpetas nativas (android/ios) si no existen
        run: |
          if [ ! -d "android" ]; then
            flutter create --org com.virtlab --project-name virtlab .
          fi

      - name: Restaurar google-services.json desde el secreto
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" | base64 -d > android/app/google-services.json

      - name: Habilitar el plugin de Google Services en Gradle
        run: |
          if ! grep -q "com.google.gms:google-services" android/build.gradle; then
            sed -i "/dependencies {/a\\        classpath 'com.google.gms:google-services:4.4.2'" android/build.gradle
          fi
          if ! grep -q "com.google.gms.google-services" android/app/build.gradle; then
            echo "apply plugin: 'com.google.gms.google-services'" >> android/app/build.gradle
          fi

      - name: Instalar dependencias
        run: flutter pub get

      - name: Compilar APK release
        run: flutter build apk --release

      - name: Subir el APK como artefacto descargable
        uses: actions/upload-artifact@v4
        with:
          name: virtlab-apk
          path: build/app/outputs/flutter-apk/app-release.apk
