name: virtlab
description: VirtLab - Descubrir, experimentar y comprender.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # Estado
  provider: ^6.1.2

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.4
  firebase_messaging: ^15.1.3

  # Persistencia local / sesión / logros offline
  shared_preferences: ^2.3.2

  # Perfil: foto de galería o cámara
  image_picker: ^1.1.2

  # Llamadas HTTP (API de Labi / Gemini)
  http: ^1.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/logros/color/
    - assets/images/logros/gris/
